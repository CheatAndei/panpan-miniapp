name: Backend Docker Image

on:
  push:
    branches:
      - main
      - deploy/prod
  workflow_dispatch:

concurrency:
  group: backend-docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rockchin
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: rockchin/panpan-miniapp-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/deploy/prod' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy production backend
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/prod'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 134.175.69.59
          username: root
          key: ${{ secrets.PANPAN_PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            if [ "${{ github.ref }}" = "refs/heads/deploy/prod" ]; then
              /opt/panpan-miniapp/deploy.sh prod
            else
              /opt/panpan-miniapp/deploy.sh main
            fi
