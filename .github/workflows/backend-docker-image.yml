name: Backend Docker Image

on:
  push:
    branches:
      - main
      - deploy/prod
  workflow_dispatch:

concurrency:
  group: backend-docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rockchin
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: rockchin/panpan-miniapp-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/deploy/prod' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy production backend
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/prod'
        uses: appleboy/ssh-action@v1.2.0
        env:
          PANPAN_APP_ID: ${{ secrets.PANPAN_APP_ID }}
          PANPAN_APP_SECRET: ${{ secrets.PANPAN_APP_SECRET }}
          PANPAN_TPL_CHECKIN: ${{ secrets.PANPAN_TPL_CHECKIN }}
          PANPAN_TPL_CHECKOUT: ${{ secrets.PANPAN_TPL_CHECKOUT }}
          PANPAN_TPL_FEEDBACK: ${{ secrets.PANPAN_TPL_FEEDBACK }}
          PANPAN_TPL_REMINDER: ${{ secrets.PANPAN_TPL_REMINDER }}
          PANPAN_TEACHER_INVITE_CODES: ${{ secrets.PANPAN_TEACHER_INVITE_CODES }}
        with:
          host: 134.175.69.59
          username: root
          key: ${{ secrets.PANPAN_PROD_SSH_KEY }}
          envs: PANPAN_APP_ID,PANPAN_APP_SECRET,PANPAN_TPL_CHECKIN,PANPAN_TPL_CHECKOUT,PANPAN_TPL_FEEDBACK,PANPAN_TPL_REMINDER,PANPAN_TEACHER_INVITE_CODES
          script: |
            set -euo pipefail
            upsert_env() {
              key="$1"
              value="$2"
              file="$3"
              mkdir -p "$(dirname "$file")"
              touch "$file"
              tmp="${file}.tmp"
              awk -v key="$key" -v value="$value" '
                BEGIN { done = 0 }
                $0 ~ "^" key "=" { print key "=" value; done = 1; next }
                { print }
                END { if (!done) print key "=" value }
              ' "$file" > "$tmp"
              mv "$tmp" "$file"
              chmod 600 "$file" || true
            }

            DEPLOY_DIR=/opt/panpan-miniapp
            SRC_DIR=/opt/panpan-miniapp-source
            REPO_URL=https://github.com/CheatAndei/panpan-miniapp.git

            mkdir -p "$DEPLOY_DIR/backend"

            ENV_FILES=("$DEPLOY_DIR/.env" "$DEPLOY_DIR/backend/.env")

            for ENV_FILE in "${ENV_FILES[@]}"; do
              upsert_env APP_ID "$PANPAN_APP_ID" "$ENV_FILE"
              upsert_env APP_SECRET "$PANPAN_APP_SECRET" "$ENV_FILE"
              upsert_env DATABASE_PATH /app/data/teach.db "$ENV_FILE"
              upsert_env UPLOAD_DIR /app/uploads "$ENV_FILE"
              upsert_env PRIVATE_UPLOAD_DIR /app/private-uploads "$ENV_FILE"
              upsert_env TEACHER_INVITE_CODES "$PANPAN_TEACHER_INVITE_CODES" "$ENV_FILE"
              upsert_env WX_MINIPROGRAM_STATE trial "$ENV_FILE"
              upsert_env TPL_CHECKIN "$PANPAN_TPL_CHECKIN" "$ENV_FILE"
              upsert_env TPL_CHECKOUT "$PANPAN_TPL_CHECKOUT" "$ENV_FILE"
              upsert_env TPL_FEEDBACK "$PANPAN_TPL_FEEDBACK" "$ENV_FILE"
              upsert_env TPL_REMINDER "$PANPAN_TPL_REMINDER" "$ENV_FILE"
              upsert_env TPL_FIELD_CHECKIN_STUDENT thing1 "$ENV_FILE"
              upsert_env TPL_FIELD_CHECKIN_TIME time3 "$ENV_FILE"
              upsert_env TPL_FIELD_CHECKIN_STATUS phrase2 "$ENV_FILE"
              upsert_env TPL_FIELD_CHECKOUT_STUDENT thing1 "$ENV_FILE"
              upsert_env TPL_FIELD_CHECKOUT_TIME time3 "$ENV_FILE"
              upsert_env TPL_FIELD_CHECKOUT_STATUS phrase2 "$ENV_FILE"
              upsert_env TPL_FIELD_FEEDBACK_TITLE thing1 "$ENV_FILE"
              upsert_env TPL_FIELD_FEEDBACK_TIME time2 "$ENV_FILE"
              upsert_env TPL_FIELD_FEEDBACK_NOTE thing3 "$ENV_FILE"
              upsert_env TPL_FIELD_REMINDER_CLASS thing1 "$ENV_FILE"
              upsert_env TPL_FIELD_REMINDER_TIME time2 "$ENV_FILE"
              upsert_env TPL_FIELD_REMINDER_NOTE thing3 "$ENV_FILE"
            done

            rm -rf "$SRC_DIR"
            CLONE_OK=0
            for attempt in 1; do
              if git clone --depth 1 --branch "${{ github.ref_name }}" "$REPO_URL" "$SRC_DIR" &&
                 git -C "$SRC_DIR" fetch --depth 1 origin "${{ github.sha }}" &&
                 git -C "$SRC_DIR" checkout --detach "${{ github.sha }}"; then
                CLONE_OK=1
                break
              fi
              rm -rf "$SRC_DIR"
              sleep 3
            done

            if [ "$CLONE_OK" = "1" ]; then
              docker build -t rockchin/panpan-miniapp-backend:main -t rockchin/panpan-miniapp-backend:latest "$SRC_DIR/backend"
              cp "$SRC_DIR/docker-compose.yml" "$DEPLOY_DIR/docker-compose.yml"
            else
              docker pull rockchin/panpan-miniapp-backend:main
              if [ ! -f "$DEPLOY_DIR/docker-compose.yml" ]; then
                cat > "$DEPLOY_DIR/docker-compose.yml" <<'EOF'
            services:
              panpan-api:
                image: rockchin/panpan-miniapp-backend:main
                container_name: panpan-api
                restart: unless-stopped
                env_file:
                  - ./.env
                  - ./backend/.env
                ports:
                  - "3000:3000"
                volumes:
                  - panpan-data:/app/data
                  - panpan-uploads:/app/uploads
                  - panpan-private-uploads:/app/private-uploads
            volumes:
              panpan-data:
              panpan-uploads:
              panpan-private-uploads:
            EOF
              fi
            fi
            cat > "$DEPLOY_DIR/docker-compose.override.yml" <<'EOF'
            services:
              panpan-api:
                image: rockchin/panpan-miniapp-backend:main
                build: null
                env_file:
                  - ./.env
                  - ./backend/.env
            EOF

            DATA_DIR="$(docker inspect panpan-api --format '{{range .Mounts}}{{if eq .Destination "/app/data"}}{{.Source}}{{end}}{{end}}' 2>/dev/null || true)"
            UPLOADS_DIR="$(docker inspect panpan-api --format '{{range .Mounts}}{{if eq .Destination "/app/uploads"}}{{.Source}}{{end}}{{end}}' 2>/dev/null || true)"
            [ -n "$DATA_DIR" ] || DATA_DIR="$(docker volume inspect panpan-miniapp_panpan-data --format '{{.Mountpoint}}' 2>/dev/null || true)"
            [ -n "$UPLOADS_DIR" ] || UPLOADS_DIR="$(docker volume inspect panpan-miniapp_panpan-uploads --format '{{.Mountpoint}}' 2>/dev/null || true)"
            if [ -z "$DATA_DIR" ]; then
              docker volume create panpan-miniapp_panpan-data >/dev/null
              DATA_DIR="$(docker volume inspect panpan-miniapp_panpan-data --format '{{.Mountpoint}}')"
            fi
            if [ -z "$UPLOADS_DIR" ]; then
              docker volume create panpan-miniapp_panpan-uploads >/dev/null
              UPLOADS_DIR="$(docker volume inspect panpan-miniapp_panpan-uploads --format '{{.Mountpoint}}')"
            fi
            mkdir -p "$DATA_DIR" "$UPLOADS_DIR"

            docker cp panpan-api:/app/db/teach.db "$DEPLOY_DIR/backend/teach.container-before-data-fix.db" 2>/dev/null || true
            CURRENT_DB="$DATA_DIR/teach.db"
            CURRENT_SIZE=0
            [ -f "$CURRENT_DB" ] && CURRENT_SIZE="$(stat -c%s "$CURRENT_DB" 2>/dev/null || echo 0)"
            BEST_DB=""
            BEST_SIZE="$CURRENT_SIZE"
            while read -r size file; do
              case "$file" in
                "$CURRENT_DB") continue ;;
              esac
              if [ "${size:-0}" -gt "${BEST_SIZE:-0}" ]; then
                BEST_SIZE="$size"
                BEST_DB="$file"
              fi
            done < <(find /opt /var/lib/docker/volumes -name teach.db -type f -printf '%s %p\n' 2>/dev/null || true)
            if [ -n "$BEST_DB" ] && [ "$BEST_SIZE" -gt "$CURRENT_SIZE" ]; then
              [ -f "$CURRENT_DB" ] && cp -a "$CURRENT_DB" "$CURRENT_DB.backup.$(date +%Y%m%d%H%M%S)"
              cp -a "$BEST_DB" "$CURRENT_DB"
              echo "Recovered DB from $BEST_DB ($BEST_SIZE bytes) to $CURRENT_DB"
            else
              echo "No larger DB candidate found. current=$CURRENT_SIZE best=$BEST_SIZE"
            fi

            for VOLUME in $(docker volume ls --format '{{.Name}}' | grep -i upload || true); do
              SRC_UPLOADS="$(docker volume inspect "$VOLUME" --format '{{.Mountpoint}}' 2>/dev/null || true)"
              if [ -n "$SRC_UPLOADS" ] && [ "$SRC_UPLOADS" != "$UPLOADS_DIR" ]; then
                cp -an "$SRC_UPLOADS"/. "$UPLOADS_DIR"/ 2>/dev/null || true
                echo "Merged uploads from volume $VOLUME"
              fi
            done

            (cd "$DEPLOY_DIR" && docker compose up -d --no-build --pull never --force-recreate)

            echo "=== deploy.sh ==="
            sed -n '1,220p' "$SRC_DIR/deploy.sh" || true
            echo "=== compose files ==="
            find "$DEPLOY_DIR" "$SRC_DIR" -maxdepth 2 \( -name '*compose*.yml' -o -name '*compose*.yaml' \) -print -exec sed -n '1,220p' {} \; || true
            echo "=== container image/mounts ==="
            docker inspect panpan-api --format 'image={{.Config.Image}} mounts={{json .Mounts}}' || true
            echo "=== container code markers ==="
            docker exec panpan-api sh -lc "grep -n 'bug2-notify-fields-v3\|time.*<= 20\|phrase.*<= 20\|thing.*<= 20\|function wxTime' /app/server.js /app/routes/notify.js || true" || true

            HEALTHY=0
            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000/api/health; then
                HEALTHY=1
                break
              fi
              sleep 2
            done
            if [ "$HEALTHY" != "1" ]; then
              echo "Backend failed its startup health check"
              docker ps -a --filter name=panpan-api
              docker inspect panpan-api --format 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' || true
              docker logs --tail 240 panpan-api 2>&1 || true
              exit 1
            fi
