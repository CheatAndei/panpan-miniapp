name: Production Inspect

on:
  workflow_dispatch:
    inputs:
      cleanup_stale_exam_sync:
        description: Stop and remove known interrupted exam sync staging
        required: false
        default: false
        type: boolean

jobs:
  inspect:
    name: Inspect production storage
    runs-on: ubuntu-latest
    steps:
      - name: Inspect production storage
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 134.175.69.59
          username: root
          key: ${{ secrets.PANPAN_PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            if [ '${{ inputs.cleanup_stale_exam_sync }}' = 'true' ]; then
              for pid in $(pgrep -f '/opt/panpan-miniapp/exam-sync/github-29902051712-1/bundle.enc' || true); do
                cmd="$(tr '\0' ' ' < "/proc/$pid/cmdline" 2>/dev/null || true)"
                exe="$(basename "$(readlink "/proc/$pid/exe" 2>/dev/null || true)")"
                if [ "$exe" = 'curl' ]; then
                  case "$cmd" in *github-29902051712-1/bundle.enc*) kill "$pid" ;; esac
                fi
              done
              for stale in \
                /opt/panpan-miniapp/exam-sync/github-29899823459-1 \
                /opt/panpan-miniapp/exam-sync/github-29901861881-1 \
                /opt/panpan-miniapp/exam-sync/github-29902051712-1 \
                /opt/panpan-miniapp/exam-sync/github-29902423863-1; do
                case "$stale" in /opt/panpan-miniapp/exam-sync/github-[0-9]*-[0-9]*) ;; *) exit 1 ;; esac
                [ ! -d "$stale" ] || rm -rf -- "$stale"
              done
              echo "stale exam sync staging cleaned"
            fi
            echo "=== containers ==="
            docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'

            echo "=== volumes ==="
            docker volume ls

            echo "=== current mounts ==="
            docker inspect panpan-api --format 'mounts={{json .Mounts}}' || true

            echo "=== container state ==="
            docker inspect panpan-api --format 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' || true

            echo "=== container logs ==="
            docker logs --tail 240 panpan-api 2>&1 || true

            echo "=== port 3000 owner ==="
            ss -ltnp '( sport = :3000 )' || true
            lsof -nP -iTCP:3000 -sTCP:LISTEN || true
            docker ps -a --format 'name={{.Names}} ports={{.Ports}} networks={{.Networks}}'
            ps -ef | grep -E '[n]ode|[p]m2|[p]anpan' || true

            echo "=== caddy routing ==="
            docker inspect panpan-caddy --format 'network={{.HostConfig.NetworkMode}} mounts={{json .Mounts}} ports={{json .NetworkSettings.Ports}}' || true
            docker exec panpan-caddy sh -lc 'find /etc/caddy /config -maxdepth 3 -type f -print -exec sed -n "1,180p" {} \;' 2>/dev/null || true

            echo "=== db candidates ==="
            find /opt /var/lib/docker/volumes /var/lib/docker/overlay2 -type f \( -name '*.db' -o -name '*.sqlite' \) -printf '%s %TY-%Tm-%Td %TH:%TM %p\n' 2>/dev/null | sort -nr | head -120 || true

            echo "=== current db table counts ==="
            docker exec panpan-api node <<'NODE' || true
            const fs = require('fs');
            const initSqlJs = require('sql.js');
            const paths = ['/app/data/teach.db', '/app/db/teach.db'];
            (async () => {
              const SQL = await initSqlJs();
              for (const file of paths) {
                if (!fs.existsSync(file)) {
                  console.log(file, 'missing');
                  continue;
                }
                const db = new SQL.Database(fs.readFileSync(file));
                const tables = ['users', 'classes', 'students', 'bindings', 'checkins', 'feedbacks'];
                const counts = {};
                for (const table of tables) {
                  try {
                    const stmt = db.prepare(`SELECT COUNT(*) AS c FROM ${table}`);
                    stmt.step();
                    counts[table] = stmt.getAsObject().c;
                    stmt.free();
                  } catch (e) {
                    counts[table] = 'n/a';
                  }
                }
                console.log(file, fs.statSync(file).size, JSON.stringify(counts));
              }
            })();
            NODE

            echo "=== upload volume file counts ==="
            for volume in $(docker volume ls --format '{{.Name}}'); do
              mount="$(docker volume inspect "$volume" --format '{{.Mountpoint}}' 2>/dev/null || true)"
              [ -n "$mount" ] || continue
              count="$(find "$mount" -type f 2>/dev/null | wc -l | tr -d ' ')"
              size="$(du -sh "$mount" 2>/dev/null | awk '{print $1}')"
              case "$volume:$count" in
                *upload*|*:0) ;;
              esac
              echo "$volume files=$count size=${size:-unknown} path=$mount"
            done

            echo "=== exam sync staging ==="
            if [ -d /opt/panpan-miniapp/exam-sync ]; then
              find /opt/panpan-miniapp/exam-sync -maxdepth 3 -type f -printf '%s %p\n' | sort
              du -sh /opt/panpan-miniapp/exam-sync
            else
              echo "none"
            fi
