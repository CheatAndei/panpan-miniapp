services:
  panpan-api:
    build:
      context: ./backend
    container_name: panpan-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - panpan-data:/app/data
      - panpan-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  panpan-data:
  panpan-uploads:
